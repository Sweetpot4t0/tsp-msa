server.port=8091

spring.datasource.url=jdbc:postgresql://postgres-db:5432/account_db
spring.datasource.username=postgres
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 운영 배포 시 JWT_SECRET 환경변수로 주입. 로컬 기본값은 데모용일 뿐 32바이트 이상이어야 HS256 키로 쓸 수 있다.
jwt.secret=${JWT_SECRET:tsp-msa-local-dev-secret-change-in-prod-0123456789abcdef}
