services:
  postgres-db:
    image: postgres:15-alpine
    container_name: tsp-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - ./db_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tsp-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: tsp-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  account-service:
    image: ${DOCKERHUB_USERNAME:-tspmsa}/tsp-account-service:latest
    build:
      context: ./account-service
      dockerfile: Dockerfile
    container_name: tsp-account-service
    ports:
      - "8091:8091"
    depends_on:
      postgres-db:
        condition: service_healthy

  tokenization-service:
    image: ${DOCKERHUB_USERNAME:-tspmsa}/tsp-tokenization-service:latest
    build:
      context: ./tokenization-service
      dockerfile: Dockerfile
    container_name: tsp-tokenization-service
    ports:
      - "8092:8092"
    depends_on:
      postgres-db:
        condition: service_healthy

  transaction-service:
    image: ${DOCKERHUB_USERNAME:-tspmsa}/tsp-transaction-service:latest
    build:
      context: ./transaction-service
      dockerfile: Dockerfile
    container_name: tsp-transaction-service
    ports:
      - "8093:8093"
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      account-service:
        condition: service_started
      tokenization-service:
        condition: service_started

  notification-service:
    image: ${DOCKERHUB_USERNAME:-tspmsa}/tsp-notification-service:latest
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: tsp-notification-service
    ports:
      - "8094:8094"
    depends_on:
      postgres-db:
        condition: service_healthy
      kafka:
        condition: service_started

  merchant-mock-service:
    image: ${DOCKERHUB_USERNAME:-tspmsa}/tsp-merchant-mock-service:latest
    build:
      context: ./merchant-mock-service
      dockerfile: Dockerfile
    container_name: tsp-merchant-mock-service
    ports:
      - "8095:8095"
    depends_on:
      postgres-db:
        condition: service_healthy
